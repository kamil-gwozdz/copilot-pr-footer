name: publish

# Publishes to npm via Trusted Publishing (OIDC) when a semver tag (vX.Y.Z) is
# pushed — no NPM_TOKEN needed. One-time setup on npmjs.com:
#   Package -> Settings -> Trusted Publisher -> GitHub Actions
#     Organization or user: kamil-gwozdz
#     Repository:           copilot-pr-footer
#     Workflow filename:    publish.yml
# Release with:  npm version patch && git push --follow-tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Verify tag matches package.json version
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      # Trusted Publishing needs a recent npm (OIDC support); the bundled one is older.
      - run: npm install -g npm@latest
      # No NODE_AUTH_TOKEN: npm detects the OIDC environment and authenticates.
      # Provenance is generated automatically for trusted publishing.
      - run: npm publish
